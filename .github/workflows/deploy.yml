name: Simple Lambda Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the latest code from repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials using GitHub secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Login to Amazon ECR (Elastic Container Registry)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # Step 4: Build Docker image and push to ECR
      - name: Build, Tag, and Push Docker image to ECR
        run: |
          # Build Docker image using Dockerfile
          docker build -t lambda-build-deploy-auto .
          # Tag image with ECR repository URI
          docker tag lambda-build-deploy-auto:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/lambda-build-deploy-auto:latest
          # Push image to ECR
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/lambda-build-deploy-auto:latest

      # Step 5: Create SQS Queue (Smart Creation)
      - name: Create SQS Queue
        run: |
          echo "🔍 Checking/Creating SQS queue..."
          aws sqs create-queue --queue-name demo-auto-queue || echo "✅ Queue already exists - skipping creation"
          
          # Get queue URL
          QUEUE_URL=$(aws sqs get-queue-url --queue-name demo-auto-queue --output text)
          echo "SQS_QUEUE_URL=$QUEUE_URL" >> $GITHUB_ENV
          echo "📨 SQS Queue URL: $QUEUE_URL"

      # Step 6: Create API Gateway REST API (Smart Creation)
      - name: Create API Gateway REST API
        run: |
          echo "🔍 Checking/Creating API Gateway REST API..."
          
          # Check if API already exists
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='demo-api'].id" --output text)
          
          if [[ -z "$API_ID" || "$API_ID" == "None" ]]; then
            echo "🆕 Creating new API Gateway REST API..."
            API_ID=$(aws apigateway create-rest-api --name demo-api --query 'id' --output text)
            echo "✅ Created new API Gateway with ID: $API_ID"
          else
            echo "✅ API Gateway already exists with ID: $API_ID"
          fi
          
          echo "API_GATEWAY_ID=$API_ID" >> $GITHUB_ENV
          echo "🌐 API Gateway ID: $API_ID"

      # Step 7: Create /send endpoint
      - name: Create /send Endpoint
        run: |
          echo "🔧 Creating /send endpoint..."
          
          # Get parent resource ID (root)
          PARENT_ID=$(aws apigateway get-resources --rest-api-id $API_GATEWAY_ID --query 'items[0].id' --output text)
          echo "📍 Parent Resource ID: $PARENT_ID"
          
          # Check if /send resource already exists
          SEND_RESOURCE_ID=$(aws apigateway get-resources --rest-api-id $API_GATEWAY_ID --query "items[?pathPart=='send'].id" --output text)
          
          if [[ -z "$SEND_RESOURCE_ID" || "$SEND_RESOURCE_ID" == "None" ]]; then
            echo "🆕 Creating /send resource..."
            RESOURCE_ID=$(aws apigateway create-resource \
              --rest-api-id $API_GATEWAY_ID \
              --parent-id $PARENT_ID \
              --path-part send \
              --query 'id' --output text)
            echo "✅ Created /send resource with ID: $RESOURCE_ID"
          else
            echo "✅ /send resource already exists with ID: $SEND_RESOURCE_ID"
            RESOURCE_ID=$SEND_RESOURCE_ID
          fi
          
          echo "SEND_RESOURCE_ID=$RESOURCE_ID" >> $GITHUB_ENV
          echo "📨 /send endpoint resource ID: $RESOURCE_ID"

      # Step 8: Update Lambda function with new Docker image
      - name: Update Lambda Function
        run: |
          # Point Lambda function to the new Docker image
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/lambda-build-deploy-auto:latest

      # Step 9: Create Lambda Trigger on SQS
      - name: Create Lambda Trigger on SQS
        run: |
          echo "🔗 Creating Lambda trigger on SQS..."
          
          # Get SQS ARN
          SQS_ARN=$(aws sqs get-queue-attributes \
            --queue-url "$SQS_QUEUE_URL" \
            --attribute-names QueueArn \
            --query 'Attributes.QueueArn' \
            --output text)
          
          echo "📨 SQS ARN: $SQS_ARN"
          
          # Create event source mapping (Lambda trigger)
          aws lambda create-event-source-mapping \
            --event-source-arn $SQS_ARN \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --batch-size 10 || echo "✅ Trigger already exists - skipping creation"
          
          echo "🔗 Lambda trigger on SQS created!"
          echo "🎯 SQS → Lambda trigger chain ready!"

      # Step 11: Deploy API Gateway
      - name: Deploy API Gateway
        run: |
          echo "🚀 Deploying API Gateway..."
          
          # Create POST method for /send endpoint
          aws apigateway put-method \
            --rest-api-id $API_GATEWAY_ID \
            --resource-id $SEND_RESOURCE_ID \
            --http-method POST \
            --authorization-type "NONE"
          
          echo "✅ POST method created for /send endpoint"
          
          # Create deployment
          DEPLOYMENT_ID=$(aws apigateway create-deployment \
            --rest-api-id $API_GATEWAY_ID \
            --stage-name prod \
            --query 'id' \
            --output text)
          
          echo "✅ API Gateway deployed with ID: $DEPLOYMENT_ID"
          
          # Get API URL
          API_URL="https://$API_GATEWAY_ID.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com/prod/send"
          echo "API_GATEWAY_URL=$API_URL" >> $GITHUB_ENV
          echo "🌐 API Gateway URL: $API_URL"

      # Step 12: Test the deployment
      - name: Test Lambda Function
        run: |
          echo "🧪 Testing Lambda deployment..."
          
          # Test your existing Functional URL
          FUNCTION_URL="https://jxmv5nfxua7xh6gbdjt7d2fmby0cpvfd.lambda-url.ap-south-1.on.aws/"
          RESPONSE=$(curl -s "$FUNCTION_URL")
          
          echo "📦 Lambda Response: $RESPONSE"
          
          if [[ $RESPONSE == *"Lambda automated deployment"* ]]; then
            echo "✅ Deployment SUCCESS - Lambda is working!"
          else
            echo "❌ Deployment FAILED - Unexpected response"
            exit 1
          fi

      # Step 13: Test SQS Queue
      - name: Test SQS Queue
        run: |
          echo "🧪 Testing SQS Queue..."
          
          # Send test message to SQS
          TEST_MESSAGE='{"test": "sqs_test", "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'
          
          aws sqs send-message \
            --queue-url "$SQS_QUEUE_URL" \
            --message-body "$TEST_MESSAGE"
          
          echo "✅ Test message sent to SQS: $TEST_MESSAGE"
          echo "📨 SQS Queue URL: $SQS_QUEUE_URL"
          echo "🎉 SQS Queue is working!"