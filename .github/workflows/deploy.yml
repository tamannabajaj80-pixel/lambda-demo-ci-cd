name: Deploy to Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the latest code from repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Configure AWS credentials using GitHub secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Login to Amazon ECR (Elastic Container Registry)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # Step 4: Build Docker image and push to ECR
      - name: Build, Tag, and Push Docker image to ECR
        run: |
          # Build Docker image using Dockerfile
          docker build -t ${{ secrets.ECR_REPOSITORY }} .
          # Tag image with ECR repository URI
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest
          # Push image to ECR
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # Step 5: Update Lambda function with new Docker image
      - name: Update Lambda Function
        run: |
          # Point Lambda function to the new Docker image
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # Step 6: Create Functional URL (FIRST TIME ONLY)
      - name: Create Functional URL
        run: |
          # Create URL only if it doesn't exist (smart trick)
          aws lambda create-function-url-config \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --auth-type NONE || echo "Functional URL already exists - skipping creation"

      # Step 7: Add Lambda URL permission (FIRST TIME ONLY)  
      - name: Add URL Permission
        run: |
          # Add public access permission only if needed
          aws lambda add-permission \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --action lambda:InvokeFunctionUrl \
            --principal "*" \
            --statement-id FunctionURLAllowPublicAccess \
            --function-url-auth-type NONE || echo "URL permission already exists - skipping"

      # Step 8: Get Functional URL and Test Deployment
      - name: Test Lambda Functional URL
        run: |
          # Get the Functional URL
          FUNCTION_URL=$(aws lambda get-function-url-config \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --query 'FunctionUrl' --output text)
          
          echo "🚀 Functional URL: $FUNCTION_URL"
          echo "🧪 Testing deployment..."
          
          # Test the deployed Lambda function
          RESPONSE=$(curl -s "$FUNCTION_URL")
          echo "📦 Lambda Response: $RESPONSE"
          
          # Validate response
          if [[ $RESPONSE == *"Hello from Lambda automated deployment!"* ]]; then
            echo "✅ Deployment SUCCESS - Lambda is working correctly!"
          else
            echo "❌ Deployment FAILED - Unexpected response"
            exit 1
          fi